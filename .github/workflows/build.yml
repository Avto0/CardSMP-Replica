name: Build CardsSMP Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -q
        working-directory: CardsSMP-v3/CardsSMP

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: CardsSMP
          path: CardsSMP-v3/CardsSMP/target/CardsSMP-*.jar
          if-no-files-found: error
