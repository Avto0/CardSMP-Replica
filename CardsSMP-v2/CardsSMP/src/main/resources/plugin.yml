name: CardsSMP
version: 2.0.0
main: dev.cardssmp.CardsSMP
api-version: '1.21'
description: Cards SMP Replica
authors: [CardsSMP]

commands:
  givecard:
    description: Give a card to a player
    usage: /givecard <player> <card>
    permission: cardssmp.admin
  cards:
    description: List all cards
    usage: /cards

permissions:
  cardssmp.admin:
    default: op
